<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AthleteManager | Treinos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="static/img/favicon.ico">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../../static/css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="/">
            <img src="static/img/logo.svg" alt="AthleteManager" class="logo-brand">
            AthleteManager
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/atletas">Atletas</a></li>
                <li class="nav-item"><a class="nav-link" href="/treinos">Treinos</a></li>
                <li class="nav-item"><a class="nav-link" href="/evolucao">Evolução</a></li>
                <li class="nav-item"><a class="nav-link" href="/avaliacoes">Avaliações</a></li>
                <li class="nav-item"><a class="nav-link" href="/competicoes">Competições</a></li>
                <li class="nav-item"><a class="nav-link" href="/metas">Metas</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTEÚDO -->
<main class="container my-5">

    <section class="hero mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h1>Treinos</h1>
            <p>Gerencie treinos, cargas e programas de treinamento.</p>
        </div>

        <button class="btn btn-warning fw-bold" data-bs-toggle="modal" data-bs-target="#modalAddTreino">
            + Novo Treino
        </button>
    </section>

    <!-- CARDS -->
    <section id="lista-treinos" class="dashboard-cards"></section>

</main>

<footer class="text-center mt-5 py-3">
    © 2025 - AthleteManager | Sistema Definitivo
</footer>

<!-- MODAL ADICIONAR TREINO -->
<div class="modal fade" id="modalAddTreino" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content p-3">

            <h4 class="mb-3">Novo Treino</h4>

            <form id="formAddTreino">

                <div class="row">
                    <div class="col-md-6">
                        <label class="mt-2">Atleta</label>
                        <select class="form-control" name="atleta_id" required>
                            <option value="">Selecione um atleta</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="mt-2">Tipo de Treino</label>
                        <input class="form-control" name="tipo" required placeholder="Ex: Força, Resistência">
                    </div>
                </div>

                <label class="mt-2">Descrição</label>
                <textarea class="form-control" name="descricao" rows="3" placeholder="Descreva o treino..."></textarea>

                <div class="row">
                    <div class="col-md-4">
                        <label class="mt-2">Duração (minutos)</label>
                        <input class="form-control" name="duracao_minutos" type="number" placeholder="60">
                    </div>
                    <div class="col-md-4">
                        <label class="mt-2">Data do Treino</label>
                        <input class="form-control" name="data_treino" type="datetime-local">
                    </div>
                    <div class="col-md-4">
                        <label class="mt-2">Intensidade</label>
                        <select class="form-control" name="intensidade">
                            <option value="">Selecione</option>
                            <option value="baixa">Baixa</option>
                            <option value="media">Média</option>
                            <option value="alta">Alta</option>
                        </select>
                    </div>
                </div>

                <button class="btn btn-success mt-3 w-100">Salvar</button>
            </form>

        </div>
    </div>
</div>

<!-- MODAL EDITAR TREINO -->
<div class="modal fade" id="modalEditTreino" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content p-3">

            <h4 class="mb-3">Editar Treino</h4>

            <form id="formEditTreino">

                <input type="hidden" name="id">

                <div class="row">
                    <div class="col-md-6">
                        <label class="mt-2">Atleta</label>
                        <select class="form-control" name="atleta_id" required>
                            <option value="">Selecione um atleta</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="mt-2">Tipo de Treino</label>
                        <input class="form-control" name="tipo" required placeholder="Ex: Força, Resistência">
                    </div>
                </div>

                <label class="mt-2">Descrição</label>
                <textarea class="form-control" name="descricao" rows="3" placeholder="Descreva o treino..."></textarea>

                <div class="row">
                    <div class="col-md-4">
                        <label class="mt-2">Duração (minutos)</label>
                        <input class="form-control" name="duracao_minutos" type="number" placeholder="60">
                    </div>
                    <div class="col-md-4">
                        <label class="mt-2">Data do Treino</label>
                        <input class="form-control" name="data_treino" type="datetime-local">
                    </div>
                    <div class="col-md-4">
                        <label class="mt-2">Intensidade</label>
                        <select class="form-control" name="intensidade">
                            <option value="">Selecione</option>
                            <option value="baixa">Baixa</option>
                            <option value="media">Média</option>
                            <option value="alta">Alta</option>
                        </select>
                    </div>
                </div>

                <button class="btn btn-primary mt-3 w-100">Salvar Alterações</button>
            </form>

        </div>
    </div>
</div>

<!-- JS -->
<script src="../../static/js/treinos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
