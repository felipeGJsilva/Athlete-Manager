<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AthleteManager | Evolução</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="static/img/favicon.ico">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../../static/css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="/">
            <img src="static/img/logo.svg" alt="AthleteManager" class="logo-brand">
            AthleteManager
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/atletas">Atletas</a></li>
                <li class="nav-item"><a class="nav-link" href="/treinos">Treinos</a></li>
                <li class="nav-item"><a class="nav-link" href="/evolucao">Evolução</a></li>
                <li class="nav-item"><a class="nav-link" href="/avaliacoes">Avaliações</a></li>
                <li class="nav-item"><a class="nav-link" href="/competicoes">Competições</a></li>
                <li class="nav-item"><a class="nav-link" href="/metas">Metas</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTEÚDO -->
<main class="container my-5">

    <section class="hero mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h1>Evolução Física</h1>
            <p>Acompanhe a evolução física dos atletas.</p>
        </div>

        <button class="btn btn-warning fw-bold" data-bs-toggle="modal" data-bs-target="#modalAddEvolucao">
            + Novo Registro
        </button>
    </section>

    <!-- CARDS -->
    <section id="lista-evolucao" class="dashboard-cards"></section>

</main>

<footer class="text-center mt-5 py-3">
    © 2025 - AthleteManager | Sistema Definitivo
</footer>

<!-- MODAL ADICIONAR EVOLUÇÃO -->
<div class="modal fade" id="modalAddEvolucao" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content p-3">

            <h4 class="mb-3">Novo Registro de Evolução</h4>

            <form id="formAddEvolucao">

                <div class="row">
                    <div class="col-md-6">
                        <label class="mt-2">Atleta</label>
                        <select class="form-control" name="atleta_id" required>
                            <option value="">Selecione um atleta</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="mt-2">Data da Medição</label>
                        <input class="form-control" name="data_medicao" type="datetime-local">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-3">
                        <label class="mt-2">Peso (kg)</label>
                        <input class="form-control" name="peso" type="number" step="0.1" required>
                    </div>
                    <div class="col-md-3">
                        <label class="mt-2">Altura (m)</label>
                        <input class="form-control" name="altura" type="number" step="0.01">
                    </div>
                    <div class="col-md-3">
                        <label class="mt-2">IMC</label>
                        <input class="form-control" name="imc" type="number" step="0.01">
                    </div>
                    <div class="col-md-3">
                        <label class="mt-2">Massa Muscular (%)</label>
                        <input class="form-control" name="massa_muscular" type="number" step="0.01">
                    </div>
                </div>

                <label class="mt-2">Gordura Corporal (%)</label>
                <input class="form-control" name="gordura_corporal" type="number" step="0.01">

                <label class="mt-2">Observações</label>
                <textarea class="form-control" name="observacoes" rows="3"></textarea>

                <button class="btn btn-success mt-3 w-100">Salvar</button>
            </form>

        </div>
    </div>
</div>

<!-- MODAL EDITAR EVOLUÇÃO -->
<div class="modal fade" id="modalEditEvolucao" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content p-3">

            <h4 class="mb-3">Editar Registro</h4>

            <form id="formEditEvolucao">

                <input type="hidden" name="id">

                <div class="row">
                    <div class="col-md-6">
                        <label class="mt-2">Atleta</label>
                        <select class="form-control" name="atleta_id" required>
                            <option value="">Selecione um atleta</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="mt-2">Data da Medição</label>
                        <input class="form-control" name="data_medicao" type="datetime-local">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-3">
                        <label class="mt-2">Peso (kg)</label>
                        <input class="form-control" name="peso" type="number" step="0.1" required>
                    </div>
                    <div class="col-md-3">
                        <label class="mt-2">Altura (m)</label>
                        <input class="form-control" name="altura" type="number" step="0.01">
                    </div>
                    <div class="col-md-3">
                        <label class="mt-2">IMC</label>
                        <input class="form-control" name="imc" type="number" step="0.01">
                    </div>
                    <div class="col-md-3">
                        <label class="mt-2">Massa Muscular (%)</label>
                        <input class="form-control" name="massa_muscular" type="number" step="0.01">
                    </div>
                </div>

                <label class="mt-2">Gordura Corporal (%)</label>
                <input class="form-control" name="gordura_corporal" type="number" step="0.01">

                <label class="mt-2">Observações</label>
                <textarea class="form-control" name="observacoes" rows="3"></textarea>

                <button class="btn btn-primary mt-3 w-100">Salvar Alterações</button>
            </form>

        </div>
    </div>
</div>

<!-- JS -->
<script src="../../static/js/evolucao.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
