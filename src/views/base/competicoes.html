<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AthleteManager | Competições</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="static/img/favicon.ico">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../../static/css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="/">
            <img src="static/img/logo.svg" alt="AthleteManager" class="logo-brand">
            AthleteManager
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/atletas">Atletas</a></li>
                <li class="nav-item"><a class="nav-link" href="/treinos">Treinos</a></li>
                <li class="nav-item"><a class="nav-link" href="/evolucao">Evolução</a></li>
                <li class="nav-item"><a class="nav-link" href="/avaliacoes">Avaliações</a></li>
                <li class="nav-item"><a class="nav-link" href="/competicoes">Competições</a></li>
                <li class="nav-item"><a class="nav-link" href="/metas">Metas</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTEÚDO -->
<main class="container my-5">

    <section class="hero mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h1>Competições</h1>
            <p>Gerencie competições, campeonatos e resultados.</p>
        </div>

        <button class="btn btn-warning fw-bold" data-bs-toggle="modal" data-bs-target="#modalAddCompeticao">
            + Nova Competição
        </button>
    </section>

    <!-- CARDS -->
    <section id="lista-competicoes" class="dashboard-cards"></section>

</main>

<footer class="text-center mt-5 py-3">
    © 2025 - AthleteManager | Sistema Definitivo
</footer>

<!-- MODAL ADICIONAR COMPETIÇÃO -->
<div class="modal fade" id="modalAddCompeticao" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content p-3">

            <h4 class="mb-3">Nova Competição</h4>

            <form id="formAddCompeticao">

                <label class="mt-2">Evento</label>
                <input class="form-control" name="evento" required placeholder="Ex: Campeonato Regional">

                <button class="btn btn-success mt-3 w-100">Salvar</button>
            </form>

        </div>
    </div>
</div>

<!-- MODAL EDITAR COMPETIÇÃO -->
<div class="modal fade" id="modalEditCompeticao" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content p-3">

            <h4 class="mb-3">Editar Competição</h4>

            <form id="formEditCompeticao">

                <input type="hidden" name="id">

                <label class="mt-2">Evento</label>
                <input class="form-control" name="evento" required>

                <button class="btn btn-primary mt-3 w-100">Salvar Alterações</button>
            </form>

        </div>
    </div>
</div>

<!-- JS -->
<script src="../../static/js/competicoes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
