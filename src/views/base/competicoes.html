<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AthleteManager | Competições</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="static/img/favicon.ico">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="../../static/css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="bg-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex justify-between">
            <div class="flex space-x-7">
                <div>
                    <a href="#/" class="flex items-center py-4 px-2">
                        <img src="static/img/logo.svg" alt="AthleteManager" class="h-8 w-8 mr-2">
                        <span class="font-semibold text-gray-500 text-lg">AthleteManager</span>
                    </a>
                </div>
            </div>
            <div class="hidden md:flex items-center space-x-1">
                <a href="#/" class="py-4 px-2 text-gray-500 font-semibold hover:text-green-500 transition duration-300">Dashboard</a>
                <a href="#/atletas" class="py-4 px-2 text-gray-500 font-semibold hover:text-green-500 transition duration-300">Atletas</a>
                <a href="#/treinos" class="py-4 px-2 text-gray-500 font-semibold hover:text-green-500 transition duration-300">Treinos</a>
                <a href="#/evolucao" class="py-4 px-2 text-gray-500 font-semibold hover:text-green-500 transition duration-300">Evolução</a>
                <a href="#/avaliacoes" class="py-4 px-2 text-gray-500 font-semibold hover:text-green-500 transition duration-300">Avaliações</a>
                <a href="#/competicoes" class="py-4 px-2 text-green-500 font-semibold">Competições</a>
                <a href="#/metas" class="py-4 px-2 text-gray-500 font-semibold hover:text-green-500 transition duration-300">Metas</a>
            </div>
        </div>
    </div>
</nav>

<!-- CONTEÚDO -->
<main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">

    <section class="mb-4 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">Competições</h1>
            <p class="text-gray-600">Gerencie competições, campeonatos e resultados.</p>
        </div>

        <button class="bg-yellow-500 hover:bg-yellow-700 text-white font-bold py-2 px-4 rounded" data-bs-toggle="modal" data-bs-target="#modalAddCompeticao">
            + Nova Competição
        </button>
    </section>

    <!-- CARDS -->
    <section id="lista-competicoes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></section>

</main>

<footer class="text-center mt-5 py-3 bg-gray-100">
    © 2025 - AthleteManager | Sistema Definitivo
</footer>

<!-- MODAL ADICIONAR COMPETIÇÃO -->
<div class="modal fade" id="modalAddCompeticao" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content p-3">

            <h4 class="mb-3">Nova Competição</h4>

            <form id="formAddCompeticao">

                <label class="mt-2">Evento</label>
                <input class="form-control" name="evento" required placeholder="Ex: Campeonato Regional">

                <button class="btn btn-success mt-3 w-100">Salvar</button>
            </form>

        </div>
    </div>
</div>

<!-- MODAL EDITAR COMPETIÇÃO -->
<div class="modal fade" id="modalEditCompeticao" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content p-3">

            <h4 class="mb-3">Editar Competição</h4>

            <form id="formEditCompeticao">

                <input type="hidden" name="id">

                <label class="mt-2">Evento</label>
                <input class="form-control" name="evento" required>

                <button class="btn btn-primary mt-3 w-100">Salvar Alterações</button>
            </form>

        </div>
    </div>
</div>

<!-- JS -->
<script src="../../static/js/competicoes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
